<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極限閃避：100方塊挑戰</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 50px;
        }
        canvas {
            background-color: #ecf0f1;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        #ui-container {
            margin-bottom: 20px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>極限閃避挑戰</h1>
        <p>使用鍵盤【上 下 左 右】移動小人（藍色方塊）。<br>碰到黑色方塊扣 1 滴血，閃過 100 個方塊即可獲勝！</p>
        <button id="startBtn">按下開始鍵</button>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        // 遊戲狀態與變數
        let gameState = 'START'; // START, PLAYING, GAMEOVER, WIN
        let animationId;
        let frameCount = 0;
        let lives = 3;
        let dodgedCount = 0;
        const WIN_CONDITION = 100;

        // 玩家 (小人) 物件
        const player = {
            x: 280,
            y: 180,
            width: 20,
            height: 20,
            speed: 5,
            color: '#3498db'
        };

        // 按鍵追蹤
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let blocks = [];

        // 監聽鍵盤事件
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            // 避免方向鍵讓網頁捲動
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // 點擊開始按鈕
        startBtn.addEventListener('click', () => {
            if (gameState !== 'PLAYING') {
                resetGame();
                gameState = 'PLAYING';
                startBtn.style.display = 'none';
                gameLoop();
            }
        });

        // 重置遊戲參數
        function resetGame() {
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height / 2 - player.height / 2;
            lives = 3;
            dodgedCount = 0;
            blocks = [];
            frameCount = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 產生四面八方來的方塊
        function spawnBlock() {
            const size = Math.random() * 30 + 15; // 隨機大小 15~45
            let x, y, vx, vy;
            const edge = Math.floor(Math.random() * 4); // 0:上, 1:右, 2:下, 3:左
            const speedMultiplier = 2 + Math.random() * 2; // 隨機速度

            if (edge === 0) { // 上
                x = Math.random() * canvas.width;
                y = -size;
                vx = (Math.random() - 0.5) * speedMultiplier;
                vy = speedMultiplier;
            } else if (edge === 1) { // 右
                x = canvas.width + size;
                y = Math.random() * canvas.height;
                vx = -speedMultiplier;
                vy = (Math.random() - 0.5) * speedMultiplier;
            } else if (edge === 2) { // 下
                x = Math.random() * canvas.width;
                y = canvas.height + size;
                vx = (Math.random() - 0.5) * speedMultiplier;
                vy = -speedMultiplier;
            } else { // 左
                x = -size;
                y = Math.random() * canvas.height;
                vx = speedMultiplier;
                vy = (Math.random() - 0.5) * speedMultiplier;
            }

            blocks.push({ x, y, width: size, height: size, vx, vy, color: '#2c3e50' });
        }

        // 更新遊戲邏輯
        function update() {
            // 玩家移動限制 (不能超出邊界)
            if (keys.ArrowUp && player.y > 0) player.y -= player.speed;
            if (keys.ArrowDown && player.y + player.height < canvas.height) player.y += player.speed;
            if (keys.ArrowLeft && player.x > 0) player.x -= player.speed;
            if (keys.ArrowRight && player.x + player.width < canvas.width) player.x += player.speed;

            // 每隔一定影格產生新方塊 (隨進度變快)
            let spawnRate = Math.max(10, 30 - Math.floor(dodgedCount / 10)); 
            if (frameCount % spawnRate === 0) {
                spawnBlock();
            }

            // 更新方塊位置與碰撞偵測
            for (let i = blocks.length - 1; i >= 0; i--) {
                let b = blocks[i];
                b.x += b.vx;
                b.y += b.vy;

                // 碰撞偵測 (AABB)
                if (player.x < b.x + b.width &&
                    player.x + player.width > b.x &&
                    player.y < b.y + b.height &&
                    player.y + player.height > b.y) {
                    
                    lives--; // 扣血
                    blocks.splice(i, 1); // 撞到的方塊消失
                    
                    // 畫面閃爍紅光效果 (簡單版：把背景塗紅一瞬間)
                    ctx.fillStyle = 'rgba(231, 76, 60, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (lives <= 0) {
                        gameState = 'GAMEOVER';
                    }
                    continue;
                }

                // 方塊飛出畫面判定 (成功閃過)
                if (b.x > canvas.width + b.width || b.x < -b.width * 2 ||
                    b.y > canvas.height + b.height || b.y < -b.height * 2) {
                    dodgedCount++;
                    blocks.splice(i, 1);
                    
                    if (dodgedCount >= WIN_CONDITION) {
                        gameState = 'WIN';
                    }
                }
            }
            frameCount++;
        }

        // 畫面繪製
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 畫玩家
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 畫敵人方塊
            blocks.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });

            // 畫文字狀態 (生命值 & 閃避數量)
            ctx.fillStyle = '#2c3e50';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            
            // 繪製愛心或文字表示生命
            ctx.fillText(`生命值: ${'❤️'.repeat(lives)}`, 10, 30);
            
            // 繪製進度
            ctx.textAlign = 'right';
            ctx.fillText(`已閃過: ${dodgedCount} / 100`, canvas.width - 10, 30);
        }

        // 遊戲主迴圈
        function gameLoop() {
            if (gameState === 'PLAYING') {
                update();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            } else if (gameState === 'GAMEOVER') {
                draw(); // 畫最後一個畫面
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e74c3c';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('遊戲結束', canvas.width / 2, canvas.height / 2);
                startBtn.innerText = '重新挑戰';
                startBtn.style.display = 'inline-block';
            } else if (gameState === 'WIN') {
                draw();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#2ecc71';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('挑戰成功！你閃過了100個方塊！', canvas.width / 2, canvas.height / 2);
                startBtn.innerText = '再玩一次';
                startBtn.style.display = 'inline-block';
            }
        }

        // 初始畫面繪製
        ctx.fillStyle = '#95a5a6';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('等待開始...', canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
