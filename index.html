<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>閃避方塊生存戰</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #222;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        touch-action: none; /* 防止手機滑動時畫面跟著捲動 */
    }
    h2 { margin: 10px 0; }
    #gameContainer {
        position: relative;
        width: 320px;
        height: 400px;
        background-color: #111;
        border: 2px solid #555;
        border-radius: 8px;
        overflow: hidden;
    }
    canvas { display: block; }
    
    /* 遊戲 UI 介面 */
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        font-weight: bold;
        text-shadow: 1px 1px 2px black;
    }
    
    /* 開始/結束畫面 */
    #overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    #overlay p { margin: 5px 20px; font-size: 14px; color: #ccc;}
    button {
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 15px;
    }
    button:active { background-color: #45a049; }

    /* 手機版虛擬按鍵 (電腦也可用滑鼠點擊) */
    #mobileControls {
        margin-top: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
    }
    .ctrl-row { display: flex; justify-content: center; }
    .btn-dir {
        width: 60px; height: 60px;
        margin: 5px;
        background-color: #444;
        border-radius: 10px;
        display: flex; justify-content: center; align-items: center;
        font-size: 24px; color: white;
        cursor: pointer;
    }
    .btn-dir:active { background-color: #777; }
</style>
</head>
<body>

<h2>閃避方塊</h2>

<div id="gameContainer">
    <canvas id="gameCanvas" width="320" height="400"></canvas>
    
    <div id="ui">
        <span id="hpDisplay">❤️ 3</span>
        <span id="scoreDisplay">閃避: 0 / 100</span>
    </div>

    <div id="overlay">
        <h1 id="messageTitle">準備開始</h1>
        <p>躲避紅方塊，閃過 100 個即可獲勝！</p>
        <p>電腦：使用上下左右鍵<br>手機：使用下方虛擬按鍵</p>
        <button id="startBtn">開始遊戲</button>
    </div>
</div>

<div id="mobileControls">
    <div class="ctrl-row">
        <div class="btn-dir" id="btn-up">⬆️</div>
    </div>
    <div class="ctrl-row">
        <div class="btn-dir" id="btn-left">⬅️</div>
        <div class="btn-dir" id="btn-down">⬇️</div>
        <div class="btn-dir" id="btn-right">➡️</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const messageTitle = document.getElementById('messageTitle');
    const hpDisplay = document.getElementById('hpDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');

    // 遊戲狀態變數
    let gameState = 'menu'; // menu, playing, gameover, win
    let animationId;
    let frames = 0;
    
    // 玩家設定 (小人)
    const player = {
        x: 150, y: 190,
        size: 20, speed: 4,
        hp: 3, dodged: 0
    };

    // 方塊陣列
    let blocks = [];

    // 按鍵狀態
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    // 監聽電腦鍵盤
    window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.code)) { keys[e.code] = true; e.preventDefault(); } });
    window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

    // 綁定虛擬按鍵功能
    function bindButton(id, key) {
        const btn = document.getElementById(id);
        // 支援觸控與滑鼠
        btn.addEventListener('touchstart', (e) => { keys[key] = true; e.preventDefault(); });
        btn.addEventListener('touchend', (e) => { keys[key] = false; e.preventDefault(); });
        btn.addEventListener('mousedown', (e) => { keys[key] = true; });
        btn.addEventListener('mouseup', (e) => { keys[key] = false; });
        btn.addEventListener('mouseleave', (e) => { keys[key] = false; });
    }
    bindButton('btn-up', 'ArrowUp');
    bindButton('btn-down', 'ArrowDown');
    bindButton('btn-left', 'ArrowLeft');
    bindButton('btn-right', 'ArrowRight');

    // 初始化遊戲
    function initGame() {
        player.x = canvas.width / 2 - player.size / 2;
        player.y = canvas.height / 2 - player.size / 2;
        player.hp = 3;
        player.dodged = 0;
        blocks = [];
        frames = 0;
        updateUI();
        gameState = 'playing';
        overlay.style.display = 'none';
        gameLoop();
    }

    // 產生從四面八方來的方塊
    function spawnBlock() {
        const size = Math.random() * 20 + 10; // 大小隨機 10~30
        let x, y, vx, vy;
        const edge = Math.floor(Math.random() * 4); // 0上 1右 2下 3左
        const speedMultiplier = Math.random() * 2 + 2; // 速度隨機 2~4

        if (edge === 0) { // 從上面來
            x = Math.random() * canvas.width; y = -size;
            vx = (Math.random() - 0.5) * 2; vy = speedMultiplier;
        } else if (edge === 1) { // 從右邊來
            x = canvas.width; y = Math.random() * canvas.height;
            vx = -speedMultiplier; vy = (Math.random() - 0.5) * 2;
        } else if (edge === 2) { // 從下面來
            x = Math.random() * canvas.width; y = canvas.height;
            vx = (Math.random() - 0.5) * 2; vy = -speedMultiplier;
        } else { // 從左邊來
            x = -size; y = Math.random() * canvas.height;
            vx = speedMultiplier; vy = (Math.random() - 0.5) * 2;
        }
        blocks.push({ x, y, size, vx, vy });
    }

    // 更新 UI 文字
    function updateUI() {
        hpDisplay.innerText = `❤️ ${player.hp}`;
        scoreDisplay.innerText = `閃避: ${player.dodged} / 100`;
    }

    // 碰撞偵測 (AABB)
    function checkCollision(rect1, rect2) {
        return (
            rect1.x < rect2.x + rect2.size &&
            rect1.x + rect1.size > rect2.x &&
            rect1.y < rect2.y + rect2.size &&
            rect1.y + rect1.size > rect2.y
        );
    }

    // 遊戲主邏輯更新
    function update() {
        if (gameState !== 'playing') return;

        // 玩家移動
        if (keys.ArrowUp && player.y > 0) player.y -= player.speed;
        if (keys.ArrowDown && player.y < canvas.height - player.size) player.y += player.speed;
        if (keys.ArrowLeft && player.x > 0) player.x -= player.speed;
        if (keys.ArrowRight && player.x < canvas.width - player.size) player.x += player.speed;

        // 每隔一段時間生成方塊 (難度可調整)
        frames++;
        if (frames % 25 === 0) spawnBlock();

        // 更新方塊位置與碰撞
        for (let i = blocks.length - 1; i >= 0; i--) {
            let b = blocks[i];
            b.x += b.vx;
            b.y += b.vy;

            // 檢查碰撞
            if (checkCollision(player, b)) {
                player.hp--;
                blocks.splice(i, 1); // 碰到方塊後將方塊移除，避免連續扣血
                updateUI();
                
                if (player.hp <= 0) {
                    endGame('gameover');
                    return;
                }
                continue;
            }

            // 檢查是否飛出邊界 (成功閃避)
            if (b.x > canvas.width + 50 || b.x < -50 || b.y > canvas.height + 50 || b.y < -50) {
                blocks.splice(i, 1);
                player.dodged++;
                updateUI();
                
                if (player.dodged >= 100) {
                    endGame('win');
                    return;
                }
            }
        }
    }

    // 畫面繪製
    function draw() {
        // 清空背景
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫小人 (玩家)
        ctx.fillStyle = '#00BCD4'; // 藍綠色
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00BCD4';
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.shadowBlur = 0; // 重置陰影

        // 畫大大小小的方塊 (障礙物)
        ctx.fillStyle = '#E91E63'; // 粉紅色
        for (let b of blocks) {
            ctx.fillRect(b.x, b.y, b.size, b.size);
        }
    }

    // 結束遊戲處理
    function endGame(result) {
        gameState = result;
        overlay.style.display = 'flex';
        startBtn.innerText = '重新開始';
        if (result === 'win') {
            messageTitle.innerText = '🎉 挑戰成功！';
            messageTitle.style.color = '#4CAF50';
        } else {
            messageTitle.innerText = '💀 遊戲結束';
            messageTitle.style.color = '#F44336';
        }
    }

    // 遊戲迴圈
    function gameLoop() {
        if (gameState === 'playing') {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    // 綁定開始按鈕
    startBtn.addEventListener('click', () => {
        cancelAnimationFrame(animationId);
        initGame();
    });

    // 初始繪製一次背景
    draw();
</script>
</body>
</html>
